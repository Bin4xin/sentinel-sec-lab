name: Deploy to bin4xin.github.io

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: Bin4xin/bin4xin.github.io
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: target-repo
          ref: gh-pages

      - name: Copy built files
        run: |
          ls -la out/
          rm -rf target-repo/sentinel-sec-lab
          mkdir -p target-repo/sentinel-sec-lab
          cp -r out/* target-repo/sentinel-sec-lab/
          ls -la out/

      - name: Commit and push
        run: |
          cd target-repo && ls -la
          cp sentinel-sec-lab/_next/ ./_next/
          cp sentinel-sec-lab/data/ ./data/
          ls -la
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Deploy sentinel-sec-lab - ${{ github.sha }}"
          git push