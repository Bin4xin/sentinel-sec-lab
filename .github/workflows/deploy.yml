name: Deploy to bin4xin.github.io

on:
  push:
    branches: [ main, master ]  # 同时监听 main 和 master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      # 重组输出目录：将 out 下所有内容移动到 out/sentinel-sec-lab
      - name: Restructure output for basePath
        run: |
          mkdir -p out/sentinel-sec-lab
          mkdir -p out/sentinel-sec-lab/assets/pics
          cp out/assets/pics/logo-small.svg out/sentinel-sec-lab/assets/pics/logo-small.svg
          cp out/assets/pics/favicon.png out/sentinel-sec-lab/assets/pics/favicon.png
          mv out/_next out/sentinel-sec-lab/ || true
          mv out/*.html out/sentinel-sec-lab/ || true
          mv out/404 out/sentinel-sec-lab/ || true
          mv out/*.txt out/sentinel-sec-lab/ || true

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: Bin4xin/bin4xin.github.io
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: target-repo
          ref: gh-pages   # 指定 gh-pages 分支

      - name: Copy built files
        run: |
          ll out/
          # 复制 sentinel-sec-lab 子目录（包含 _next 和 HTML）
          cp -r out/sentinel-sec-lab target-repo/
          # 复制 assets 和 data 到目标仓库根目录（与 sentinel-sec-lab 同级）
          cp -r out/assets target-repo/ 2>/dev/null || true
          cp -r out/data target-repo/ 2>/dev/null || true

      - name: Commit and push
        run: |
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Deploy sentinel-sec-lab - ${{ github.sha }}"
          git push