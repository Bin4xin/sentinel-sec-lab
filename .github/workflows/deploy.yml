name: Deploy to bin4xin.github.io

on:
  push:
    branches: [ main, master ]  # 同时监听 main 和 master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      # 重组输出目录：将 out 下所有内容移动到 out/sentinel-sec-lab
      - name: Restructure output for basePath
        run: |
          mkdir -p out/sentinel-sec-lab
          # 移动 _next 目录
          mv out/_next out/sentinel-sec-lab/ || true
          # 移动所有 .html 文件
          mv out/*.html out/sentinel-sec-lab/ || true
          # 移动 404 目录（如果存在）
          mv out/404 out/sentinel-sec-lab/ || true
          # 移动 index.txt 等根目录下的文本文件（根据你的输出调整）
          mv out/*.txt out/sentinel-sec-lab/ || true
          # 注意：不要移动 assets 和 data 目录

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: Bin4xin/bin4xin.github.io
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: target-repo
          ref: gh-pages   # 指定 gh-pages 分支

      - name: Copy built files
        run: |
          rm -rf target-repo/sentinel-sec-lab
          cp -r out/sentinel-sec-lab target-repo/

      - name: Commit and push
        run: |
          cd target-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Deploy sentinel-sec-lab - ${{ github.sha }}"
          git push