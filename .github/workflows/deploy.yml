name: Deploy to bin4xin.github.io

on:
  push:
    branches: [ main, master ]  # 同时监听 main 和 master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      # 重组输出目录：将 out 下所有内容移动到 out/sentinel-sec-lab
      - name: Restructure output for basePath
        run: |
          mkdir -p out/sentinel-sec-lab
          find out -maxdepth 1 -not -name "sentinel-sec-lab" -not -name "out" -exec mv {} out/sentinel-sec-lab/ \;
          ls -la out/sentinel-sec-lab/

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: Bin4xin/bin4xin.github.io
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          path: target-repo
          ref: gh-pages   # 指定 gh-pages 分支

      - name: Copy built files
        run: |
          ls -la out/
          cp -r out/sentinel-sec-lab target-repo/

      - name: Commit and push
        run: |
          cd target-repo && ls -la
          mv sentinel-sec-lab/_next/ .
          mv sentinel-sec-lab/data/ .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Deploy sentinel-sec-lab - ${{ github.sha }}"
          git push